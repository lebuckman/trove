name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly published queries get run against existing code.
    - cron: "27 3 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Swap to security-extended for broader (noisier) coverage.
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
